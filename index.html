<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Social AI Library</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="auth-modal" class="modal active">
        <div class="modal-content glass text-center">
            <span class="logo-icon" style="font-size: 3rem; margin-bottom: 1rem; display: block;">✧</span>
            <h2 style="margin-bottom: 0.5rem;">Welcome to Lumina</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Choose a username to join the community.</p>
            <form id="login-form" style="display: flex; gap: 1rem; flex-direction: column;">
                <input type="text" id="username-input" class="input-field" placeholder="Username..." required minlength="3">
                <button type="submit" class="btn-primary w-full">Enter</button>
            </form>
        </div>
    </div>

    <!-- Book Details Modal -->
    <div id="book-modal" class="modal">
        <div class="modal-content glass book-modal-layout">
            <button class="btn-close" id="close-book-modal">✕</button>
            <div class="book-modal-sidebar">
                <img id="modal-cover" src="" alt="Cover" class="book-cover">
            </div>
            <div class="book-modal-main">
                <h2 id="modal-title">Loading...</h2>
                <p id="modal-author" style="color: var(--accent-3); margin-bottom: 1rem;"></p>
                <div id="modal-tags" class="book-tags"></div>
                <div class="modal-blurb">
                    <div id="modal-spinner" class="spinner"></div>
                    <p id="modal-desc"></p>
                </div>
                <a id="modal-link" href="#" target="_blank" class="btn-primary" style="display: inline-block; text-decoration: none; margin-top: 1rem;">View on OpenLibrary</a>
            </div>
        </div>
    </div>

    <div class="app-container">
        <!-- Header & Nav -->
        <header class="app-header glass">
            <div class="logo-container" id="home-btn" title="Back to Home">
                <span class="logo-icon">✧</span>
                <h1 class="logo-text">Lumina</h1>
            </div>
            <div class="nav-tabs">
                <button class="nav-tab active" data-target="search-view">Search</button>
                <button class="nav-tab" data-target="library-view">My Library</button>
                <button class="nav-tab" data-target="clubs-view">Book Clubs</button>
            </div>
            <div class="user-profile" id="user-display">Guest</div>
        </header>

        <main class="main-content">
            <!-- Search View -->
            <section id="search-view" class="view-section active">
                <form id="search-form" class="search-container glass" style="display:flex; gap:0.5rem; padding:1.5rem; margin-bottom: 2rem;">
                    <input type="text" id="search-input" class="input-field" style="flex:1;" placeholder="Search for books, authors..." required autocomplete="off">
                    <button type="submit" class="btn-primary" id="search-btn">Search</button>
                </form>
                
                <h2 class="section-title">Discover <span id="search-query-display"></span></h2>
                <div id="loading-msg" class="spinner hidden"></div>
                <div id="search-results" class="books-grid">
                    <!-- Search results will be injected here -->
                </div>
            </section>

            <!-- Library View -->
            <section id="library-view" class="view-section">
                <h2 class="section-title">My Library</h2>
                <div class="library-tabs">
                    <button class="tab-btn active" data-tab="want-to-read">Want to Read</button>
                    <button class="tab-btn" data-tab="read">Read</button>
                </div>
                <div id="library-want-to-read" class="books-grid tab-content active"></div>
                <div id="library-read" class="books-grid tab-content hidden"></div>
            </section>

            <!-- Clubs View -->
            <section id="clubs-view" class="view-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h2 class="section-title" style="margin-bottom: 0;">Community Clubs</h2>
                    <button class="btn-primary" id="btn-create-club">+ New Club</button>
                </div>

                <div id="clubs-grid" class="clubs-grid">
                    <!-- Clubs injected here -->
                </div>

                <!-- Active Club Chat (Hidden by default) -->
                <div id="active-club-view" class="hidden">
                    <button class="btn-action want-read" id="btn-back-clubs" style="margin-bottom: 1rem;">← Back to Clubs</button>
                    <div class="chat-container glass" style="height: 600px;">
                        <div class="chat-header" id="active-club-header">
                            Club Name
                        </div>
                        <div id="club-chat-history" class="chat-history">
                            <!-- Messages -->
                        </div>
                        <form id="club-chat-form" class="chat-input-area">
                            <input type="text" id="club-input" class="input-field" placeholder="Type a message..." required autocomplete="off">
                            <button type="submit" class="btn-primary">Send</button>
                        </form>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
